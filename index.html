<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <link rel="icon" type="image/jpeg" href="/favicon.ico"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
    <title>Fireteam Leader</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background: #070d15;
            color: #e9f2ff;
            font-family: "Roboto Mono", Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-variant-emoji: text;
        }
    </style>
</head>
<body>
<div id="app">
    <div id="game-enter-wrapper" class="flex column align-center justify-center pos-absolute w-100 h-100">
        <div class="intro-box-1 flex column align-center justify-center">
            <img draggable="false" width="225" src="/images/ft_logo_main.png" alt="Game Logo">
            <button id="game-enter" class="game-btn game-btn-lg game-btn-green">Enter Game</button>
        </div>
    </div>
    <div id="game">
        <div id="g-wrapper-inner">
            <div id="g-upper"></div>
            <div id="g-left"></div>
            <div id="g-center" class="game-main-content">
                <div class="o_container"></div>
            </div>
            <div id="g-menu"></div>
            <div id="g-right"></div>
            <div id="g-lower"></div>
        </div>
    </div>
</div>
<script type="module" src="/src/main.ts"></script>
</body>
</html>
